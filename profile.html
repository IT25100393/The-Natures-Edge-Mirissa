<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - The Nature's Edge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('146292.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px;
        }

        .profile-card { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            width: 100%; max-width: 500px; text-align: center; 
        }

        h2 { color: #2d5a27; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-weight: bold; color: #2d5a27; margin-bottom: 5px; }
        input { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; 
            box-sizing: border-box; font-size: 16px; background: #fdfdfd; transition: 0.3s;
        }
        input:focus { border-color: #2d5a27; outline: none; }

        .verify-box { display: flex; gap: 10px; align-items: center; margin-top: 5px; }
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .unverified { background: #ffe5e5; color: #d9534f; }
        .verified { background: #e5f9e5; color: #28a745; }
        .btn-verify { background: #0056b3; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .btn-update { 
            background: #2d5a27; color: white; border: none; padding: 15px; width: 100%; 
            border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; 
            transition: 0.3s; margin-top: 20px;
        }
        .btn-update:hover { background: #3e7a37; transform: translateY(-2px); }

        /* Modal Styles */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
            z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px;
            text-align: center; position: relative; animation: popIn 0.3s ease-out;
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-icon { font-size: 50px; margin-bottom: 15px; }
        .success-icon { color: #28a745; }
        .error-icon { color: #d9534f; }
        .otp-icon { color: #0056b3; }

        .otp-input-box { font-size: 24px; letter-spacing: 10px; text-align: center; border: 2px solid #0056b3 !important; }
        .btn-modal { padding: 12px 25px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-close { background: #eee; color: #333; }
        .btn-confirm { background: #0056b3; color: white; margin-left: 10px; }

        .nav-links { margin-top: 20px; display: flex; justify-content: space-between; }
        .nav-links a { color: #666; text-decoration: none; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="profile-card">
        <h2><i class="fas fa-user-circle"></i> My Profile</h2>
        <form id="profileForm" onsubmit="handleProfileUpdate(event)">
            <div style="position: relative; width: 120px; margin: 0 auto 20px;">
                <img id="userImg" src="default-avatar.png" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #2d5a27;">
                <label for="picUpload" style="position: absolute; bottom: 0; right: 0; background: #2d5a27; color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white;">
                    <i class="fas fa-camera"></i>
                </label>
                <input type="file" id="picUpload" style="display: none;" accept="image/*" onchange="uploadPic()">
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="profName" required>
            </div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="profEmail" readonly style="background: #f0f0f0;">
                <div class="verify-box">
                    <span id="emailStatus" class="badge unverified">Unverified</span>
                    <button type="button" id="verifyBtn" class="btn-verify" onclick="requestOTP()">Verify Email</button>
                </div>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="profPhone" placeholder="+94 ...">
            </div>

            <div style="background: #f9f9f9; padding: 15px; border-radius: 12px; margin-top: 20px; border: 1px solid #eee;">
                <label style="color: #666; font-size: 0.85rem; display: block; margin-bottom: 10px;">CHANGE PASSWORD</label>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPass" placeholder="Enter new password">
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmPass" placeholder="Re-type new password">
                </div>
            </div>

            <button type="submit" class="btn-update">UPDATE PROFILE</button>
        </form>
        <div class="nav-links">
            <a href="dashboard.html"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
            <a href="#" onclick="logout()" style="color: #ff4d4d;">Logout</a>
        </div>
    </div>

    <div id="otpModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-icon otp-icon"><i class="fas fa-shield-alt"></i></div>
            <h3>Verify Your Email</h3>
            <p>Enter the 6-digit code sent to your email.</p>
            <input type="text" id="otpCode" class="otp-input-box" maxlength="6" placeholder="000000">
            <div>
                <button class="btn-modal btn-close" onclick="closeModal('otpModal')">Cancel</button>
                <button class="btn-modal btn-confirm" onclick="verifyOTP()">Verify Code</button>
            </div>
        </div>
    </div>

    <div id="msgModal" class="modal-overlay">
        <div class="modal-content">
            <div id="msgIcon" class="modal-icon"></div>
            <h3 id="msgTitle"></h3>
            <p id="msgText"></p>
            <button class="btn-modal btn-close" onclick="closeModal('msgModal')">OK</button>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        
        window.onload = async () => {
            if (!user) window.location.href = 'login.html';
            
            // Default විස්තර පෙන්වීම
            document.getElementById('profName').value = user.username;
            document.getElementById('profEmail').value = user.email;
            
            // Server එකෙන් කලින් store වුණු විස්තර (පින්තූරය ඇතුළුව) ලබාගැනීම
            try {
                const res = await fetch(`http://localhost:3000/get-user-details?email=${user.email}`);
                const data = await res.json();
                
                if (res.ok) {
                    // Phone number එක update කිරීම
                    document.getElementById('profPhone').value = data.phone || "";
                    
                    // පින්තූරය කලින් store වෙලා තිබේනම් එය පෙන්වීම
                    if (data.profilePic) {
                        document.getElementById('userImg').src = `http://localhost:3000${data.profilePic}`;
                    }

                    // Email verification status එක update කිරීම
                    if (data.isEmailVerified) {
                        document.getElementById('emailStatus').className = "badge verified";
                        document.getElementById('emailStatus').innerText = "Verified ✅";
                        document.getElementById('verifyBtn').style.display = "none";
                    }
                }
            } catch (err) {
                console.error("Error loading profile details:", err);
            }
        };

        function showMsg(title, text, type) {
            document.getElementById('msgTitle').innerText = title;
            document.getElementById('msgText').innerText = text;
            const iconDiv = document.getElementById('msgIcon');
            iconDiv.innerHTML = type === 'success' ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-times-circle"></i>';
            iconDiv.className = `modal-icon ${type}-icon`;
            document.getElementById('msgModal').style.display = 'flex';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        async function requestOTP() {
            // 1. මුලින්ම Popup එක වහාම පෙන්වන්න (සර්වර් එකෙන් උත්තරේ එනකන් ඉන්නේ නැතුව)
            document.getElementById('otpModal').style.display = 'flex';
            window.verifyingType = 'email'; // අපි දැන් email වෙරිෆයි කරන බව සටහන් කරගමු

            try {
                // 2. සර්වර් එකට background එකේ request එක යවන්න
                const res = await fetch('http://localhost:3000/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: user.email })
                });

                // 3. යම් හෙයකින් සර්වර් එකේ error එකක් ආවොත් පමණක් දැනුම් දෙන්න
                if (!res.ok) {
                    closeModal('otpModal'); // Modal එක වහන්න
                    showMsg("Error", "Could not send OTP code. Please try again.", "error");
                }
            } catch (err) {
                closeModal('otpModal');
                showMsg("Error", "Server connection failed.", "error");
            }
        }

        async function verifyOTP() {
            const otp = document.getElementById('otpCode').value;
            const email = user.email;
            const phone = document.getElementById('profPhone').value;
            
            // වෙරිෆයි කරන්නේ මොකක්ද කියලා තීරණය කිරීම
            const url = window.verifyingType === 'phone' ? 'http://localhost:3000/verify-phone-otp' : 'http://localhost:3000/verify-otp';
            const bodyData = window.verifyingType === 'phone' ? { phone, otp } : { email, otp };

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });

                if (res.ok) {
                    closeModal('otpModal');
                    showMsg("Success", "Verified successfully!", "success");
                    setTimeout(() => location.reload(), 2000);
                } else {
                    showMsg("Failed", "Invalid or expired code!", "error");
                }
            } catch (err) { console.error(err); }
        }

        // --- Profile Update with Password Match Check ---
        async function handleProfileUpdate(event) {
            event.preventDefault();
            const newName = document.getElementById('profName').value;
            const newPhone = document.getElementById('profPhone').value;
            const pass1 = document.getElementById('newPass').value;
            const pass2 = document.getElementById('confirmPass').value;

            // 1. Password එක ගහලා තියෙනවා නම් ඒ දෙක සමානද කියලා බලනවා
            if (pass1 !== "" || pass2 !== "") {
                if (pass1 !== pass2) {
                    showMsg("Match Error", "Passwords do not match! Please check again.", "error");
                    document.getElementById('confirmPass').style.borderColor = "red";
                    return;
                }
                if (pass1.length < 6) {
                    showMsg("Security", "Password must be at least 6 characters.", "error");
                    return;
                }
            }

            const updateData = {
                email: user.email,
                username: newName,
                phone: newPhone,
                newPassword: pass1 // සමාන නම් පමණක් මෙතැනට එයි
            };

            try {
                const res = await fetch('http://localhost:3000/update-profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updateData)
                });
                if (res.ok) {
                    user.username = newName;
                    localStorage.setItem('user', JSON.stringify(user));
                    showMsg("Success", "Profile updated successfully!", "success");
                    document.getElementById('confirmPass').style.borderColor = "#ddd";
                    // Passwords fields හිස් කිරීම
                    document.getElementById('newPass').value = "";
                    document.getElementById('confirmPass').value = "";
                }
            } catch (err) { showMsg("Error", "Update failed.", "error"); }
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
        async function uploadPic() {
            const fileInput = document.getElementById('picUpload');
            if (fileInput.files.length === 0) return;

            const formData = new FormData();
            formData.append('profilePic', fileInput.files[0]);
            formData.append('email', user.email);

            try {
                const res = await fetch('http://localhost:3000/update-profile-pic', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('userImg').src = `http://localhost:3000${data.imageUrl}`;
                    showMsg("Success", "Profile picture updated!", "success");
                }
            } catch (err) { showMsg("Error", "Upload failed!", "error"); }
        }
        // Phone OTP ඉල්ලීම සඳහා වන Function එක
        async function requestPhoneOTP() {
            const phone = document.getElementById('profPhone').value;
            
            // අංකය ඇතුළත් කර ඇත්දැයි බැලීම
            if (!phone) {
                showMsg("Error", "Please enter a phone number first!", "error");
                return;
            }

            try {
                const res = await fetch('http://localhost:3000/send-sms-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        phone: phone, 
                        email: user.email // මෙය අනිවාර්යයෙන්ම එක් කරන්න
                    })

                });
                
                if (res.ok) {
                    // OTP එක ගහන්න Modal එක පෙන්වීම
                    document.getElementById('otpModal').style.display = 'flex';
                    // OTP එක Verify කරද්දී Phone එකද Email එකද කියලා දැනගන්න අපි පොඩි flag එකක් තියාගමු
                    window.verifyingType = 'phone'; 
                } else {
                    showMsg("Error", "Failed to send SMS. Check your phone number format.", "error");
                }
            } catch (err) {
                showMsg("Error", "Server connection failed.", "error");
            }
        }
    </script>
</body>
</html>
