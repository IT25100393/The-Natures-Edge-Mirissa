<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - The Nature's Edge Mirissa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('146292.jpg') no-repeat center center fixed; background-size: cover; color: white; min-height: 100vh; }
        
        nav { background: rgba(45, 90, 39, 0.2); backdrop-filter: blur(15px); padding: 20px 0; text-align: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        nav a { color: white; text-decoration: none; margin: 0 25px; font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px; font-size: 14px; transition: 0.3s; }
        nav a:hover { color: #a2d2a2; }

        .contact-container { max-width: 700px; margin: 50px auto; background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); color: #333; animation: fadeIn 0.8s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: #2d5a27; text-align: center; font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #2d5a27; }
        input[type="text"], input[type="email"], textarea { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; background: #f9f9f9; transition: 0.3s; }
        input:focus, textarea:focus { outline: none; border-color: #2d5a27; background: #fff; }
        
        button { background-color: #2d5a27; color: white; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; width: 100%; transition: 0.3s; box-shadow: 0 4px 15px rgba(45, 90, 39, 0.2); }
        button:hover { background-color: #1e3d1a; transform: translateY(-2px); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        .contact-details { margin-top: 30px; padding-top: 25px; border-top: 1px solid #eee; display: flex; justify-content: space-around; flex-wrap: wrap; }
        .info-item { text-align: center; margin: 10px; min-width: 150px; }
        .info-item strong { display: block; color: #2d5a27; margin-bottom: 5px; }
        .info-item p { margin: 0; color: #555; font-size: 0.95rem; }

        /* --- Global Popup Styles --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
            z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 35px; border-radius: 25px; width: 90%; max-width: 400px;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-icon { font-size: 60px; margin-bottom: 20px; }
        .success-icon { color: #28a745; }
        .error-icon { color: #ff4d4d; }
        .modal-btn {
            background: #2d5a27; color: white; border: none; padding: 12px 30px;
            border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px;
            transition: 0.3s; width: 100%; font-size: 16px;
        }
        .modal-btn:hover { background: #1e3d1a; transform: translateY(-2px); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="contact-container">
        <h1>Book Your Stay</h1>
        <p class="subtitle">Send us a message and we will get back to you soon!</p>

        <form id="contactForm" onsubmit="handleContactSubmit(event)">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Subject (Optional)</label>
                <input type="text" id="subject" placeholder="What is this about?">
            </div>

            <div class="form-group">
                <label>Your Message / Inquiry</label>
                <textarea id="message" rows="5" placeholder="Tell us about your dates and guests..." required></textarea>
            </div>

            <button type="submit" id="submitBtn">Send Message</button>
        </form>

        <div class="contact-details">
            <div class="info-item"><strong>Phone</strong><p>071 752 6757</p></div>
            <div class="info-item"><strong>Email</strong><p>tharushajayod1@gmail.com</p></div>
            <div class="info-item"><strong>Location</strong><p>Mirissa, Sri Lanka</p></div>
        </div>
    </div>

    <div id="statusModal" class="modal-overlay">
        <div class="modal-content">
            <div id="statusIcon" class="modal-icon"></div>
            <h2 id="statusTitle" style="margin: 0; color: #333;"></h2>
            <p id="statusText" style="color: #666; margin-top: 10px; font-size: 16px;"></p>
            <button class="modal-btn" onclick="closeStatusModal()">OK</button>
        </div>
    </div>

    <script>
        // Popup පෙන්වීමේ function එක
        function showPopup(title, text, type) {
            const modal = document.getElementById('statusModal');
            const icon = document.getElementById('statusIcon');
            const titleEl = document.getElementById('statusTitle');
            const textEl = document.getElementById('statusText');

            titleEl.innerText = title;
            textEl.innerText = text;

            if (type === 'success') {
                icon.innerHTML = '<i class="fas fa-check-circle"></i>';
                icon.className = 'modal-icon success-icon';
            } else {
                icon.innerHTML = '<i class="fas fa-times-circle"></i>';
                icon.className = 'modal-icon error-icon';
            }

            modal.style.display = 'flex';
        }

        function closeStatusModal() {
            document.getElementById('statusModal').style.display = 'none';
        }

        async function handleContactSubmit(event) {
            event.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                subject: document.getElementById('subject').value || "Villa Inquiry",
                message: document.getElementById('message').value
            };

            // UI එක Update කිරීම
            submitBtn.innerText = "Sending...";
            submitBtn.disabled = true;

            try {
                const response = await fetch('serious-florie-thenaturesedge-d1a60d22.koyeb.app//contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    // බොත්තම වහාම මාරු කරයි
                    submitBtn.innerText = "Message Sent ✅";
                    submitBtn.style.backgroundColor = "#28a745";
                    
                    // Popup එක පෙන්වයි
                    showPopup("Success!", "Your message has been sent successfully. We will contact you soon!", "success");

                    // තත්පර 3කට පසු reload කරයි
                    setTimeout(() => {
                        location.reload(); 
                    }, 3000);
                } else {
                    const result = await response.json();
                    showPopup("Error", result.error || "Failed to send message.", "error");
                    submitBtn.innerText = "Send Message";
                    submitBtn.disabled = false;
                }
            } catch (err) {
                showPopup("Server Error", "Could not connect to the server.", "error");
                submitBtn.innerText = "Send Message";
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
