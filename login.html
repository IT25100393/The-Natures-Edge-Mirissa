<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - The Nature's Edge Mirissa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('146292.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(45, 90, 39, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 20px;
            text-align: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: clamp(0.75rem, 2vw, 0.9rem);
            transition: 0.3s;
        }

        nav a:hover {
            color: #a2d2a2;
        }

        /* Login Card */
        .login-card { 
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            text-align: center;
            animation: fadeIn 0.8s ease-in;
            margin-top: 80px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            color: #2d5a27;
            font-size: clamp(1.8rem, 5vw, 2.2rem);
            margin-bottom: 30px;
        }

        /* Form Styles */
        .form-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #2d5a27;
            font-size: clamp(0.85rem, 2vw, 0.95rem);
        }

        input { 
            width: 100%;
            padding: 14px;
            padding-right: 45px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: clamp(0.9rem, 2vw, 1rem);
            background: #f9f9f9;
            transition: 0.3s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #2d5a27;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(45, 90, 39, 0.1);
        }

        input.error {
            border-color: #ff4d4d;
            background: #fff5f5;
        }

        /* Password visibility toggle */
        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
            font-size: 1.1rem;
            user-select: none;
        }

        .toggle-password:hover {
            color: #2d5a27;
        }

        /* Error Message */
        .error-msg {
            color: #ff4d4d;
            font-size: clamp(0.8rem, 2vw, 0.9rem);
            font-weight: 600;
            margin: 10px 0;
            text-align: left;
            padding: 10px;
            background: #fff5f5;
            border-left: 3px solid #ff4d4d;
            border-radius: 5px;
            display: none;
            line-height: 1.4;
        }

        /* Submit Button */
        .btn { 
            background: #2d5a27;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            font-size: clamp(1rem, 2.5vw, 1.1rem);
            font-weight: bold;
            transition: 0.3s;
            margin-top: 15px;
        }

        .btn:hover:not(:disabled) {
            background: #3e7a37;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(45, 90, 39, 0.3);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn.success {
            background: #28a745;
        }

        /* Links */
        .forgot-password {
            margin-top: 15px;
            text-align: center;
        }

        .forgot-password a {
            color: #2d5a27;
            text-decoration: none;
            font-size: clamp(0.85rem, 2vw, 0.95rem);
            font-weight: 600;
            transition: 0.3s;
        }

        .forgot-password a:hover {
            color: #3e7a37;
            text-decoration: underline;
        }

        .signup-link {
            margin-top: 25px;
            font-size: clamp(0.85rem, 2vw, 0.95rem);
            color: #666;
            text-align: center;
        }

        .signup-link a {
            color: #2d5a27;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .signup-link a:hover {
            color: #3e7a37;
            text-decoration: underline;
        }

        /* Modal Popup */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 35px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: popupAnim 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popupAnim {
            from {
                transform: scale(0.7);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-icon {
            font-size: clamp(50px, 12vw, 60px);
            margin-bottom: 20px;
        }

        .success-icon { color: #28a745; }
        .error-icon { color: #d9534f; }

        .modal-content h2 {
            margin: 0;
            color: #333;
            font-size: clamp(1.3rem, 4vw, 1.6rem);
        }

        .modal-content p {
            color: #666;
            margin-top: 10px;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            line-height: 1.5;
        }

        .modal-btn {
            background: #2d5a27;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
            width: 100%;
            font-size: clamp(0.95rem, 2.5vw, 1rem);
        }

        .modal-btn:hover {
            background: #1e3d1a;
            transform: translateY(-2px);
        }

        /* Loading Spinner */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        /* Mobile Optimizations */
        @media (max-width: 768px) {
            nav {
                padding: 12px 10px;
            }

            nav a {
                margin: 0 8px;
                font-size: 0.75rem;
            }

            .login-card {
                padding: 30px 25px;
                margin-top: 70px;
            }

            .modal-content {
                padding: 25px 20px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .login-card {
                padding: 25px 20px;
                margin-top: 60px;
            }

            input {
                padding: 12px;
                padding-right: 40px;
            }

            .btn {
                padding: 13px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="login-card">
        <h2>Login</h2>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                    <span class="toggle-password" onclick="togglePassword()">
                        <i class="far fa-eye" id="password-eye"></i>
                    </span>
                </div>
            </div>
            
            <div class="error-msg" id="error-msg"></div>

            <button type="submit" class="btn" id="loginBtn">Login</button>

            <div class="forgot-password">
                <a href="forgot-password.html">Forgot Password?</a>
            </div>
        </form>

        <div class="signup-link">
            Don't have an account? <a href="signup.html">Sign Up</a>
        </div>
    </div>

    <!-- Modal Popup -->
    <div id="globalModal" class="modal-overlay" onclick="handleModalClick(event)">
        <div class="modal-content">
            <div id="globalIcon" class="modal-icon"></div>
            <h2 id="globalTitle"></h2>
            <p id="globalText"></p>
            <button class="modal-btn" onclick="closeGlobalModal()">OK</button>
        </div>
    </div>

    <script>
        // Password visibility toggle
        function togglePassword() {
            const field = document.getElementById('password');
            const icon = document.getElementById('password-eye');
            
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Show popup function
        function showPopup(title, text, type) {
            const modal = document.getElementById('globalModal');
            const icon = document.getElementById('globalIcon');
            const titleEl = document.getElementById('globalTitle');
            const textEl = document.getElementById('globalText');

            titleEl.innerText = title;
            textEl.innerText = text;

            if (type === 'success') {
                icon.innerHTML = '<i class="fas fa-check-circle"></i>';
                icon.className = 'modal-icon success-icon';
            } else {
                icon.innerHTML = '<i class="fas fa-times-circle"></i>';
                icon.className = 'modal-icon error-icon';
            }

            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        // Close modal function
        function closeGlobalModal() {
            document.getElementById('globalModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Handle modal background click
        function handleModalClick(event) {
            if (event.target.id === 'globalModal') {
                closeGlobalModal();
            }
        }

        // Close on Escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeGlobalModal();
            }
        });

        // Handle Login
        async function handleLogin(event) {
            event.preventDefault();
        
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
        
            if (!email || !password) {
                showPopup("Error", "Please enter both email and password!", "error");
                return;
            }
        
            loginBtn.innerHTML = 'Logging in<span class="loading-spinner"></span>';
            loginBtn.disabled = true;
        
            try {
                const response = await fetch('https://serious-florie-thenaturesedge-d1a60d22.koyeb.app/admin/login', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ 
                        email: email.toLowerCase(), 
                        password: password 
                    })
                });
        
                const data = await response.json();
        
                if (response.ok && data.token) {
                    // ✅ Save token
                    localStorage.setItem('token', data.token);
                    
                    // ✅ Save user data (CRITICAL!)
                    localStorage.setItem('user', JSON.stringify({
                        email: data.email || email,
                        username: data.username || email.split('@')[0]
                    }));
                    
                    // Success
                    loginBtn.innerText = "Login Successful ✅";
                    loginBtn.classList.add('success');
                    
                    showPopup("Welcome Back!", "Redirecting to dashboard...", "success");
                    
                    // Redirect
                    setTimeout(() => {
                        window.location.href = data.redirectUrl || 'dashboard.html';
                    }, 1500);
        
                } else {
                    showPopup("Login Failed", data.message || "Invalid email or password", "error");
                    loginBtn.innerText = 'Login';
                    loginBtn.disabled = false;
                }
        
            } catch (err) {
                console.error("Login Error:", err);
                showPopup("Connection Error", "Cannot connect to server", "error");
                loginBtn.innerText = 'Login';
                loginBtn.disabled = false;
            }
        }

        // Input field event listeners
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', function() {
                this.classList.remove('error');
                const errorDiv = document.getElementById('error-msg');
                if (errorDiv.style.display === 'block') {
                    errorDiv.style.display = 'none';
                }
            });
        });

        // Check if already logged in
        window.addEventListener('load', function() {
            const token = localStorage.getItem('token');
            if (token) {
                // User is already logged in, redirect to dashboard
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                // You can add additional logic here to verify the token if needed
            }
        });
    </script>
</body>
</html>
