<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - The Nature's Edge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('146292.jpg') no-repeat center center fixed;
            background-size: cover; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; 
        }

        .card { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); padding: 40px; 
            border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center; 
        }

        h2 { color: #2d5a27; margin-bottom: 20px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        
        .btn { background: #2d5a27; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #3e7a37; transform: translateY(-2px); }

        .hidden { display: none; }
        
        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; animation: popIn 0.3s ease-out; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="card">
        <h2>Forgot Password?</h2>
        
        <div id="step1">
            <p>Enter your registered email to receive a recovery code.</p>
            <input type="email" id="emailInput" placeholder="Email Address" required>
            <button class="btn" onclick="sendResetOTP()">Send Code</button>
        </div>

        <div id="step2" class="hidden">
            <p>Enter the 6-digit code sent to your email and your new password.</p>
            <input type="text" id="otpInput" placeholder="6-Digit Code" maxlength="6">
            <input type="password" id="newPassInput" placeholder="New Password">
            <input type="password" id="confirmPassInput" placeholder="Confirm New Password">
            <button class="btn" onclick="resetPassword()">Reset Password</button>
        </div>

        <div style="margin-top: 20px;">
            <a href="login.html" style="color: #666; text-decoration: none; font-size: 14px;">Back to Login</a>
        </div>
    </div>

    <div id="msgModal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="msgTitle"></h3>
            <p id="msgText"></p>
            <button class="btn" onclick="closeMsg()">OK</button>
        </div>
    </div>

    <script>
        function showMsg(title, text) {
            document.getElementById('msgTitle').innerText = title;
            document.getElementById('msgText').innerText = text;
            document.getElementById('msgModal').style.display = 'flex';
        }

        function closeMsg() { document.getElementById('msgModal').style.display = 'none'; }

        async function sendResetOTP() {
            const email = document.getElementById('emailInput').value;
            if(!email) return showMsg("Error", "Please enter your email!");

            try {
                const res = await fetch('https://serious-florie-thenaturesedge-d1a60d22.koyeb.app/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                if (res.ok) {
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                    showMsg("Success", "OTP sent to your email!");
                } else { showMsg("Failed", "Email not found!"); }
            } catch (err) { showMsg("Error", "Server connection failed!"); }
        }

        async function resetPassword() {
            const email = document.getElementById('emailInput').value;
            const otp = document.getElementById('otpInput').value;
            const pass1 = document.getElementById('newPassInput').value;
            const pass2 = document.getElementById('confirmPassInput').value;

            if (pass1 !== pass2) return showMsg("Error", "Passwords do not match!");
            if (pass1.length < 6) return showMsg("Error", "Password must be at least 6 characters!");

            try {
                const res = await fetch('https://serious-florie-thenaturesedge-d1a60d22.koyeb.app/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp, newPassword: pass1 })
                });
                const data = await res.json();
                if (res.ok) {
                    showMsg("Success", "Password reset successfully!");
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else { showMsg("Failed", data.message); }
            } catch (err) { showMsg("Error", "Request failed!"); }
        }
    </script>
</body>
</html>
