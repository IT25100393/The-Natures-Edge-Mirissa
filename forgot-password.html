<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Forgot Password - The Nature's Edge Mirissa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('146292.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(45, 90, 39, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 20px;
            text-align: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: clamp(0.75rem, 2vw, 0.9rem);
            transition: 0.3s;
        }

        nav a:hover {
            color: #a2d2a2;
        }

        /* Card Container */
        .card { 
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
            animation: fadeIn 0.8s ease-in;
            margin-top: 80px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            color: #2d5a27;
            margin-bottom: 15px;
            font-size: clamp(1.6rem, 5vw, 2rem);
        }

        p {
            color: #666;
            font-size: clamp(0.85rem, 2vw, 0.95rem);
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #2d5a27;
            font-size: clamp(0.85rem, 2vw, 0.95rem);
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: clamp(0.9rem, 2vw, 1rem);
            background: #f9f9f9;
            transition: 0.3s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #2d5a27;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(45, 90, 39, 0.1);
        }

        input.error {
            border-color: #ff4d4d;
            background: #fff5f5;
        }

        /* Password visibility toggle */
        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
            font-size: 1.1rem;
            user-select: none;
        }

        .toggle-password:hover {
            color: #2d5a27;
        }

        /* Error Message */
        .error-msg {
            color: #ff4d4d;
            font-size: clamp(0.8rem, 2vw, 0.9rem);
            font-weight: 600;
            margin: 10px 0;
            text-align: left;
            padding: 10px;
            background: #fff5f5;
            border-left: 3px solid #ff4d4d;
            border-radius: 5px;
            display: none;
            line-height: 1.4;
        }

        /* Buttons */
        .btn {
            background: #2d5a27;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            font-size: clamp(1rem, 2.5vw, 1.1rem);
            font-weight: bold;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover:not(:disabled) {
            background: #3e7a37;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(45, 90, 39, 0.3);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn.success {
            background: #28a745;
        }

        /* Hidden class */
        .hidden {
            display: none !important;
        }

        /* Back to Login Link */
        .back-link {
            margin-top: 25px;
        }

        .back-link a {
            color: #2d5a27;
            text-decoration: none;
            font-size: clamp(0.85rem, 2vw, 0.95rem);
            font-weight: 600;
            transition: 0.3s;
        }

        .back-link a:hover {
            color: #3e7a37;
            text-decoration: underline;
        }

        /* Modal Overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 35px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from {
                transform: scale(0.7);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-icon {
            font-size: clamp(50px, 12vw, 60px);
            margin-bottom: 20px;
        }

        .success-icon { color: #28a745; }
        .error-icon { color: #d9534f; }
        .info-icon { color: #007bff; }

        .modal-content h3 {
            margin: 0;
            color: #333;
            font-size: clamp(1.3rem, 4vw, 1.6rem);
            margin-bottom: 10px;
        }

        .modal-content p {
            color: #666;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            line-height: 1.5;
        }

        .modal-btn {
            background: #2d5a27;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
            width: 100%;
            font-size: clamp(0.95rem, 2.5vw, 1rem);
        }

        .modal-btn:hover {
            background: #1e3d1a;
            transform: translateY(-2px);
        }

        /* Loading Spinner */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        /* OTP Input Style */
        #otpInput {
            text-align: center;
            letter-spacing: 8px;
            font-size: 1.3rem;
            font-weight: bold;
        }

        /* Mobile Optimizations */
        @media (max-width: 768px) {
            nav {
                padding: 12px 10px;
            }

            nav a {
                margin: 0 8px;
                font-size: 0.75rem;
            }

            .card {
                padding: 30px 25px;
                margin-top: 70px;
            }

            .modal-content {
                padding: 25px 20px;
            }

            #otpInput {
                letter-spacing: 6px;
                font-size: 1.1rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .card {
                padding: 25px 20px;
                margin-top: 60px;
            }

            input {
                padding: 12px;
            }

            .btn {
                padding: 13px;
            }

            #otpInput {
                letter-spacing: 4px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="card">
        <h2>Forgot Password?</h2>
        
        <!-- Step 1: Email Input -->
        <div id="step1">
            <p>Enter your registered email address to receive a password recovery code.</p>
            
            <div class="form-group">
                <label for="emailInput">Email Address</label>
                <input type="email" id="emailInput" name="email" placeholder="Enter your email" required autocomplete="email">
            </div>

            <div class="error-msg" id="step1-error"></div>
            
            <button class="btn" id="sendCodeBtn" onclick="sendResetOTP()">Send Recovery Code</button>
        </div>

        <!-- Step 2: OTP and New Password -->
        <div id="step2" class="hidden">
            <p>Enter the 6-digit code sent to your email and create a new password.</p>
            
            <div class="form-group">
                <label for="otpInput">Recovery Code</label>
                <input type="text" id="otpInput" name="otp" placeholder="000000" maxlength="6" inputmode="numeric" pattern="[0-9]*">
            </div>

            <div class="form-group">
                <label for="newPassInput">New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="newPassInput" name="new-password" placeholder="Create new password" autocomplete="new-password">
                    <span class="toggle-password" onclick="togglePassword('newPassInput')">
                        <i class="far fa-eye" id="newPassInput-eye"></i>
                    </span>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassInput">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassInput" name="confirm-password" placeholder="Confirm new password" autocomplete="new-password">
                    <span class="toggle-password" onclick="togglePassword('confirmPassInput')">
                        <i class="far fa-eye" id="confirmPassInput-eye"></i>
                    </span>
                </div>
            </div>

            <div class="error-msg" id="step2-error"></div>
            
            <button class="btn" id="resetBtn" onclick="resetPassword()">Reset Password</button>
        </div>

        <div class="back-link">
            <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
        </div>
    </div>

    <!-- Modal Popup -->
    <div id="msgModal" class="modal-overlay" onclick="handleModalClick(event)">
        <div class="modal-content">
            <div id="msgIcon" class="modal-icon"></div>
            <h3 id="msgTitle"></h3>
            <p id="msgText"></p>
            <button class="modal-btn" onclick="closeMsg()">OK</button>
        </div>
    </div>

    <script>
        // Password visibility toggle
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const icon = document.getElementById(fieldId + '-eye');
            
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Show message modal
        function showMsg(title, text, type = 'info') {
            const icon = document.getElementById('msgIcon');
            
            if (type === 'success') {
                icon.innerHTML = '<i class="fas fa-check-circle"></i>';
                icon.className = 'modal-icon success-icon';
            } else if (type === 'error') {
                icon.innerHTML = '<i class="fas fa-times-circle"></i>';
                icon.className = 'modal-icon error-icon';
            } else {
                icon.innerHTML = '<i class="fas fa-info-circle"></i>';
                icon.className = 'modal-icon info-icon';
            }

            document.getElementById('msgTitle').innerText = title;
            document.getElementById('msgText').innerText = text;
            document.getElementById('msgModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        // Close modal
        function closeMsg() {
            document.getElementById('msgModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Handle modal background click
        function handleModalClick(event) {
            if (event.target.id === 'msgModal') {
                closeMsg();
            }
        }

        // Close on Escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeMsg();
            }
        });

        // Send OTP to email
        async function sendResetOTP() {
            const email = document.getElementById('emailInput').value.trim();
            const errorDiv = document.getElementById('step1-error');
            const sendBtn = document.getElementById('sendCodeBtn');
            
            // Reset error
            errorDiv.style.display = 'none';
            document.getElementById('emailInput').classList.remove('error');

            // Validation
            if (!email) {
                errorDiv.innerText = "Please enter your email address!";
                errorDiv.style.display = 'block';
                document.getElementById('emailInput').classList.add('error');
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                errorDiv.innerText = "Please enter a valid email address!";
                errorDiv.style.display = 'block';
                document.getElementById('emailInput').classList.add('error');
                return;
            }

            // Update button state
            const originalText = sendBtn.innerText;
            sendBtn.innerHTML = 'Sending Code<span class="loading-spinner"></span>';
            sendBtn.disabled = true;

            try {
                const res = await fetch('https://serious-florie-thenaturesedge-d1a60d22.koyeb.app/send-otp', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email: email.toLowerCase() })
                });

                const data = await res.json();

                if (res.ok) {
                    // Success - Move to step 2
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                    showMsg("Code Sent!", "A 6-digit recovery code has been sent to your email. Please check your inbox.", "success");
                } else {
                    // Error
                    const errorMessage = data.message || "Email not found in our system!";
                    errorDiv.innerText = errorMessage;
                    errorDiv.style.display = 'block';
                    document.getElementById('emailInput').classList.add('error');
                    showMsg("Failed", errorMessage, "error");
                }
            } catch (err) {
                console.error("Send OTP Error:", err);
                errorDiv.innerText = "Connection error. Please try again.";
                errorDiv.style.display = 'block';
                showMsg("Connection Error", "Server is not responding. Please try again later.", "error");
            } finally {
                sendBtn.innerText = originalText;
                sendBtn.disabled = false;
            }
        }

        // Reset password with OTP
        async function resetPassword() {
            const email = document.getElementById('emailInput').value.trim();
            const otp = document.getElementById('otpInput').value.trim();
            const pass1 = document.getElementById('newPassInput').value;
            const pass2 = document.getElementById('confirmPassInput').value;
            const errorDiv = document.getElementById('step2-error');
            const resetBtn = document.getElementById('resetBtn');

            // Reset errors
            errorDiv.style.display = 'none';
            document.querySelectorAll('#step2 input').forEach(i => i.classList.remove('error'));

            // Validation
            if (!otp) {
                errorDiv.innerText = "Please enter the recovery code!";
                errorDiv.style.display = 'block';
                document.getElementById('otpInput').classList.add('error');
                return;
            }

            if (otp.length !== 6 || !/^\d+$/.test(otp)) {
                errorDiv.innerText = "Recovery code must be 6 digits!";
                errorDiv.style.display = 'block';
                document.getElementById('otpInput').classList.add('error');
                return;
            }

            if (!pass1 || !pass2) {
                errorDiv.innerText = "Please enter and confirm your new password!";
                errorDiv.style.display = 'block';
                return;
            }

            if (pass1.length < 6) {
                errorDiv.innerText = "Password must be at least 6 characters long!";
                errorDiv.style.display = 'block';
                document.getElementById('newPassInput').classList.add('error');
                return;
            }

            if (pass1 !== pass2) {
                errorDiv.innerText = "Passwords do not match!";
                errorDiv.style.display = 'block';
                document.getElementById('confirmPassInput').classList.add('error');
                return;
            }

            // Update button state
            const originalText = resetBtn.innerText;
            resetBtn.innerHTML = 'Resetting Password<span class="loading-spinner"></span>';
            resetBtn.disabled = true;

            try {
                const res = await fetch('https://serious-florie-thenaturesedge-d1a60d22.koyeb.app/reset-password', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ 
                        email: email.toLowerCase(), 
                        otp: otp, 
                        newPassword: pass1 
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    // Success
                    resetBtn.innerText = "Password Reset ✅";
                    resetBtn.classList.add('success');
                    
                    showMsg(
                        "Success!", 
                        "Your password has been reset successfully! Redirecting to login...", 
                        "success"
                    );
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2500);
                } else {
                    // Error
                    const errorMessage = data.message || "Failed to reset password. Invalid or expired code.";
                    errorDiv.innerText = errorMessage;
                    errorDiv.style.display = 'block';
                    
                    if (errorMessage.toLowerCase().includes('code') || errorMessage.toLowerCase().includes('otp')) {
                        document.getElementById('otpInput').classList.add('error');
                    }
                    
                    showMsg("Reset Failed", errorMessage, "error");
                    resetBtn.innerText = originalText;
                    resetBtn.disabled = false;
                }
            } catch (err) {
                console.error("Reset Password Error:", err);
                errorDiv.innerText = "Connection error. Please try again.";
                errorDiv.style.display = 'block';
                showMsg("Connection Error", "Server is not responding. Please try again later.", "error");
                resetBtn.innerText = originalText;
                resetBtn.disabled = false;
            }
        }

        // Input field event listeners
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', function() {
                this.classList.remove('error');
                const step = this.closest('#step1, #step2');
                if (step) {
                    const errorDiv = step.querySelector('.error-msg');
                    if (errorDiv && errorDiv.style.display === 'block') {
                        errorDiv.style.display = 'none';
                    }
                }
            });
        });

        // Auto-format OTP input (numbers only)
        document.getElementById('otpInput').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
