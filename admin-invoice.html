<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Revenue Statement - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
    :root { 
        --sidebar-color: #002347; 
        --primary-green: #2d5a27; 
        --bg-light: #f4f7f6; 
    }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: var(--bg-light); }
    
    /* --- Sidebar Navigation Styling (පිරිසිදු පෙනුම සඳහා) --- */
    .sidebar { 
        width: 260px; height: 100vh; background: var(--sidebar-color); 
        color: white; position: fixed; padding-top: 20px; 
    }
    .sidebar h2 { text-align: center; color: #a2d2a2; font-size: 1.2rem; margin-bottom: 30px; }
    
    .sidebar a {
        display: flex; align-items: center; color: #bdc3c7; 
        padding: 15px 25px; text-decoration: none; /* පරණ නිල් පාට ඉවත් කිරීමට */
        transition: all 0.3s ease; font-size: 0.95rem;
    }
    
    .sidebar a i {
        margin-right: 12px; width: 20px; text-align: center; font-size: 1.1rem;
    }
    
    /* දැනට ඉන්න පේජ් එකේ indicator එක */
    .sidebar a.active {
        background: rgba(255,255,255,0.1); color: white; border-left: 4px solid #a2d2a2;
    }

    .sidebar a:hover {
        background: rgba(255,255,255,0.1); color: white; padding-left: 30px;
    }
    
    /* Main Content Area */
    .main-content { margin-left: 260px; width: calc(100% - 260px); padding: 30px; box-sizing: border-box; }
    .month-section { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 40px; }
    .month-header { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; color: var(--sidebar-color); }
    
    /* Table Styling */
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #edf2f7; font-size: 0.85rem; }
    th { background: #f8fafc; color: #4a5568; font-weight: bold; text-transform: uppercase; }
    .status-badge { padding: 4px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: bold; display: inline-block; }
    .total-row { background: #f1f9f1; font-weight: bold; color: var(--primary-green); font-size: 1rem; }
</style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="sidebar">
        <h2>THE NATURE'S EDGE</h2>
        <a href="admin-dashboard.html"><i class="fas fa-chart-line"></i> Dashboard Overview</a>        
        <a href="admin-dashboard.html#bookings"><i class="fas fa-calendar-check"></i> Manage Bookings</a>
        <a href="admin-dashboard.html#messages"><i class="fas fa-envelope"></i> Guest Messages</a>
        <a href="admin-dashboard.html#prices"><i class="fas fa-tag"></i> Price Settings</a>
        <a href="admin-dashboard.html#gallery"><i class="fas fa-images"></i> Gallery Manager</a>
        
        <a href="admin-invoice.html" class="active" style="color: white; border-left: 4px solid #a2d2a2;">
            <i class="fas fa-file-invoice-dollar"></i> Revenue Statement
        </a>
        
        <a href="admin-reviews.html"><i class="fas fa-star-half-alt"></i> Manage Reviews</a>
        
        <a href="login.html" style="margin-top: 50px; color: #ff4d4d;"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>

    <div class="main-content">
        <h1 style="color: var(--sidebar-color);"><i class="fas fa-history"></i> Monthly Revenue Statement</h1>
        <button onclick="downloadPDF()" style="background: #2d5a27; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-weight: bold;">
            <i class="fas fa-file-pdf"></i> DOWNLOAD AS PDF
        </button>
        <p style="color: #666;">Detailed breakdown of income and guest statistics.</p>
        <hr>
        <div id="statementContainer">
            <p style="text-align: center; color: #999; margin-top: 50px;">Loading data...</p>
        </div>
    </div>

    <script>
        async function fetchStatement() {
            try {
                const res = await fetch('https://serious-florie-thenaturesedge-d1a60d22.koyeb.app/admin/all-bookings');
                const bookings = await res.json();
                const container = document.getElementById('statementContainer');
                container.innerHTML = "";

                if (bookings.length === 0) {
                    container.innerHTML = "<p style='text-align:center;'>No booking records found.</p>";
                    return;
                }

                // 1. දත්ත මාස අනුව වෙන් කිරීම (Group by Month)
                const monthlyData = {};
                bookings.forEach(b => {
                    const date = new Date(b.bookedAt || b.checkIn);
                    const monthYear = date.toLocaleString('default', { month: 'long', year: 'numeric' });
                    if (!monthlyData[monthYear]) monthlyData[monthYear] = [];
                    monthlyData[monthYear].push(b);
                });

                // 2. සෑම මාසයක් සඳහාම වගුවක් අඳින ලූප් එක
                for (const month in monthlyData) {
                    let monthTotal = 0;
                    let tableHTML = `
                        <div class="month-section">
                            <div class="month-header"><h2><i class="far fa-calendar-alt"></i> ${month}</h2></div>
                            <div style="overflow-x: auto;">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Guest Name</th>
                                            <th>Country</th>
                                            <th>Booked Date</th>
                                            <th>Stay Dates (In-Out)</th>
                                            <th>Villa Type</th>
                                            <th>Nights</th>
                                            <th>Total Price</th>
                                            <th>Status</th>
                                        </tr>
                                    </thead>
                                    <tbody>`;

                                        monthlyData[month].forEach(b => {
                                            const isCancelled = b.status === 'Cancelled';
                                            const price = Number(b.totalPrice) || 0;
                                            
                                            // Cancelled නොවන ඒවා පමණක් මුළු ආදායමට එකතු කරයි
                                            if (!isCancelled) monthTotal += price;

                                            // දින ගණන (Nights count) ගණනය කිරීම
                                            const checkIn = new Date(b.checkIn);
                                            const checkOut = new Date(b.checkOut);
                                            const diffTime = Math.abs(checkOut - checkIn);
                                            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 

                                            tableHTML += `
                                                <tr>
                                                    <td><strong>${b.guestDetails?.fullName || 'Guest'}</strong></td>
                                                    <td>${(b.guestDetails && b.guestDetails.nationality) ? b.guestDetails.nationality : 'N/A'}</td>
                                                    <td>${new Date(b.bookedAt).toLocaleDateString()}</td>
                                                    <td>${checkIn.toLocaleDateString()} - ${checkOut.toLocaleDateString()}</td>
                                                    <td>${b.roomType}</td>
                                                    <td><span style="color:#555;">${diffDays} Night(s)</span></td>
                                                    <td>$${price.toLocaleString()}</td>
                                                    <td>
                                                        <span class="status-badge" style="background:${isCancelled ? '#ffe5e5' : '#e5f9e5'}; color:${isCancelled ? '#d9534f' : '#28a745'};">
                                                            ${b.status || 'Confirmed'}
                                                        </span>
                                                    </td>
                                                </tr>`;
                                        });

                                                tableHTML += `
                                        <tr class="total-row">
                                            <td colspan="6" style="text-align:right">Monthly Net Revenue (Confirmed Bookings):</td>
                                            <td colspan="2">$${monthTotal.toLocaleString()}</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>`;
                    container.innerHTML += tableHTML;
                }
            } catch (err) {
                document.getElementById('statementContainer').innerHTML = "<p style='color:red; text-align:center;'>Error loading data from server.</p>";
            }
        }

        function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4'); // Landscape mode

        doc.setFontSize(18);
        doc.text("The Nature's Edge Mirissa - Revenue Statement", 14, 20);
        doc.setFontSize(11);
        doc.text(`Report Generated: ${new Date().toLocaleString()}`, 14, 28);

        // පේජ් එකේ තියෙන හැම වගුවක්ම (Monthly Tables) සොයාගනී
        const tables = document.querySelectorAll('table');
        let startY = 35;

        tables.forEach((table, index) => {
            const monthTitle = table.closest('.month-section').querySelector('h2').innerText;
            
            doc.setFontSize(14);
            doc.setTextColor(45, 90, 39);
            doc.text(monthTitle, 14, startY);

            doc.autoTable({
                html: table,
                startY: startY + 5,
                theme: 'grid',
                headStyles: { fillStyle: [0, 35, 71], fontSize: 9 },
                styles: { fontSize: 8 },
                margin: { bottom: 20 }
            });

            startY = doc.lastAutoTable.finalY + 15;
            
            // පේජ් එක ඉවර නම් අලුත් පේජ් එකක් එක් කරයි
            if (startY > 180 && index < tables.length - 1) {
                doc.addPage();
                startY = 20;
            }
        });

        doc.save("Nature_Edge_Revenue_Report.pdf");
    }

        window.onload = fetchStatement;
    </script>
</body>
</html>
